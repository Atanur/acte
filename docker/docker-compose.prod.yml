# ─────────────────────────────────────────────────────────
# docker-compose.prod.yml – Production stack for Acte
# ─────────────────────────────────────────────────────────
# Nginx reverse-proxy + Backend API + PostgreSQL.
# Designed to run on a single VPS behind certbot-issued TLS.
# ─────────────────────────────────────────────────────────

services:
  # ─── Reverse Proxy ──────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: acte-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx configuration
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL certificates (provisioned by certbot on the host)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # ACME challenge directory (certbot writes here)
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Backend API ────────────────────────────────
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-acte/backend}:${TAG:-latest}
    container_name: acte-backend
    restart: unless-stopped
    pull_policy: always
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      SENTRY_DSN: ${SENTRY_DSN:-}
      # Add other env vars as needed:
      # REDIS_URL: ${REDIS_URL}
      # RESEND_API_KEY: ${RESEND_API_KEY}
      # R2_ENDPOINT: ${R2_ENDPOINT}
      # R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      # R2_SECRET_KEY: ${R2_SECRET_KEY}
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:4000/api/health').then(r=>r.json()).then(d=>process.exit(d.status==='ok'?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ─── PostgreSQL ─────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: acte-postgres
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: acte
      POSTGRES_USER: acte
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acte"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
