# ─────────────────────────────────────────────────────────
# nginx.conf – Production reverse proxy for Acte
# ─────────────────────────────────────────────────────────
# Serves as the ingress point, terminating TLS and
# proxying requests to the backend (port 4000).
# ─────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    # ── Basic settings ──────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 16M;

    # ── Logging ─────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log   warn;

    # ── Upstream: Backend API ──────────────────────
    upstream backend {
        server backend:4000;
    }

    # ─────────────────────────────────────────────────
    # HTTP server (port 80)
    #   – Redirects everything to HTTPS **except**
    #     the ACME challenge path used by certbot.
    # ─────────────────────────────────────────────────
    server {
        listen      80 default_server;
        listen [::]:80 default_server;
        server_name acte.app api.acte.app;

        # ACME challenge — certbot writes here
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Everything else → HTTPS redirect
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────────────
    # HTTPS server (port 443)
    # ─────────────────────────────────────────────────
    server {
        listen      443 ssl http2;
        listen [::]:443 ssl http2;
        server_name acte.app api.acte.app;

        # ── TLS certificates (provisioned by certbot) ─
        ssl_certificate     /etc/letsencrypt/live/acte.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/acte.app/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/acte.app/chain.pem;

        # ── Modern TLS config ────────────────────────
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ── HSTS (opt-in; uncomment after confirming TLS works) ─
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Security headers ─────────────────────────
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header X-XSS-Protection          "0" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # ── Backend proxy ────────────────────────────
        location / {
            proxy_pass http://backend;

            # Forward the original request details
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (if needed later)
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts
            proxy_connect_timeout   10s;
            proxy_send_timeout      60s;
            proxy_read_timeout      60s;
        }
    }
}
