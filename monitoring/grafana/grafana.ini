# ─────────────────────────────────────────────────────────
# Grafana Configuration – Acte
# ─────────────────────────────────────────────────────────

[server]
# Serve on all interfaces inside the Docker network
domain = localhost

[auth.anonymous]
# Allow read-only anonymous access to dashboards
enabled = true
org_role = Viewer

[paths]
# Directory where provisioning configs live
provisioning = /etc/grafana/provisioning

[dashboards]
# Enable dashboard provisioning by default
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/default.yml
